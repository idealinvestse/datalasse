version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "4023:4023"
    environment:
      - PORT=4023
      - MOSS_MOCK=1
      - SKIP_PAYMENT=1
      - REDIS_URL=redis://redis:6379
      # Add LANGFUSE_* or CDP_* here for real tracing/facilitator
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
